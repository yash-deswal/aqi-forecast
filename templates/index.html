<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AQI Forecast — AI-Powered Air Quality Prediction</title>
  <meta name="description" content="Predict the Air Quality Index (AQI) for major Indian cities using a machine learning model trained on historical pollution data." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <div class="page-wrapper">

    <header class="header">
      <div class="header-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="56" height="56" fill="none" aria-hidden="true">
          <circle cx="32" cy="32" r="32" fill="url(#logo-bg)"/>
          <path d="M14 26 Q22 20 30 26 Q38 32 46 26" stroke="url(#logo-stroke)" stroke-width="3.2" stroke-linecap="round" fill="none"/>
          <path d="M14 32 Q22 26 30 32 Q38 38 46 32" stroke="url(#logo-stroke)" stroke-width="3.2" stroke-linecap="round" fill="none"/>
          <path d="M14 38 Q22 32 30 38 Q38 44 46 38" stroke="url(#logo-stroke2)" stroke-width="3.2" stroke-linecap="round" fill="none"/>
          <defs>
            <linearGradient id="logo-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#1e3a5f"/>
              <stop offset="100%" stop-color="#2d1b69"/>
            </linearGradient>
            <linearGradient id="logo-stroke" x1="14" y1="26" x2="46" y2="26" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#a5c8ff"/>
              <stop offset="100%" stop-color="#c084fc"/>
            </linearGradient>
            <linearGradient id="logo-stroke2" x1="14" y1="38" x2="46" y2="38" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#7b8fff"/>
              <stop offset="100%" stop-color="#a5c8ff"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1 class="header-title">AQI Forecast</h1>
      <p class="header-sub">AI-Powered Air Quality Index Prediction for Indian Cities</p>
    </header>

    <main class="card" role="main">

      <form id="aqi-form" novalidate>

        <div class="field-group">
          <label class="field-label" for="city">City</label>
          <div class="select-wrapper">
            <select id="city" name="city" required>
              <option value="" disabled selected>Select a city…</option>
              <option value="Delhi">Delhi</option>
              <option value="Mumbai">Mumbai</option>
              <option value="Bengaluru">Bengaluru</option>
              <option value="Chennai">Chennai</option>
              <option value="Kolkata">Kolkata</option>
              <option value="Hyderabad">Hyderabad</option>
              <option value="Pune">Pune</option>
              <option value="Ahmedabad">Ahmedabad</option>
              <option value="Jaipur">Jaipur</option>
              <option value="Lucknow">Lucknow</option>
              <option value="Kanpur">Kanpur</option>
              <option value="Noida">Noida</option>
              <option value="Ghaziabad">Ghaziabad</option>
              <option value="Faridabad">Faridabad</option>
              <option value="Gurugram">Gurugram</option>
              <option value="Patna">Patna</option>
              <option value="Bhopal">Bhopal</option>
              <option value="Indore">Indore</option>
              <option value="Nagpur">Nagpur</option>
              <option value="Visakhapatnam">Visakhapatnam</option>
              <option value="Surat">Surat</option>
              <option value="Vadodara">Vadodara</option>
              <option value="Amritsar">Amritsar</option>
              <option value="Chandigarh">Chandigarh</option>
              <option value="Varanasi">Varanasi</option>
            </select>
            <span class="select-arrow">▾</span>
          </div>
        </div>

        <div class="field-row">
          <div class="field-group">
            <label class="field-label" for="day">Day</label>
            <input id="day" name="day" type="number" min="1" max="31"
                   placeholder="e.g. 15" required />
          </div>
          <div class="field-group">
            <label class="field-label" for="month">Month</label>
            <input id="month" name="month" type="number" min="1" max="12"
                   placeholder="e.g. 6" required />
          </div>
          <div class="field-group">
            <label class="field-label" for="year">Year</label>
            <input id="year" name="year" type="number" min="2015" max="2030"
                   placeholder="e.g. 2024" required />
          </div>
        </div>

        <div class="section-label">Historical AQI (Lag Features)</div>
        <div class="field-row">
          <div class="field-group">
            <label class="field-label" for="AQI_lag1">AQI — 1 day ago</label>
            <input id="AQI_lag1" name="AQI_lag1" type="number" step="0.01"
                   placeholder="e.g. 145.5" required />
          </div>
          <div class="field-group">
            <label class="field-label" for="AQI_lag2">AQI — 2 days ago</label>
            <input id="AQI_lag2" name="AQI_lag2" type="number" step="0.01"
                   placeholder="e.g. 130.0" required />
          </div>
          <div class="field-group">
            <label class="field-label" for="AQI_lag3">AQI — 3 days ago</label>
            <input id="AQI_lag3" name="AQI_lag3" type="number" step="0.01"
                   placeholder="e.g. 120.0" required />
          </div>
        </div>

        <button type="submit" id="predict-btn" class="predict-btn">
          <span class="btn-text">Predict AQI</span>
          <span class="btn-spinner" aria-hidden="true"></span>
        </button>

      </form>

      <section id="result-section" class="result-section" aria-live="polite" hidden>
        <div class="result-divider"></div>
        <div class="result-content">
          <p class="result-label">Predicted Air Quality Index</p>
          <div id="aqi-badge" class="aqi-badge">
            <span id="aqi-value" class="aqi-number">—</span>
          </div>
          <p id="aqi-category" class="aqi-category">—</p>
          <p id="aqi-desc" class="aqi-desc">—</p>
        </div>
      </section>

      <div id="error-box" class="error-box" hidden role="alert"></div>

    </main>

    <footer class="footer">
      <p>Built with FastAPI · scikit-learn · ❤️ — AQI scale as per CPCB India</p>
    </footer>

  </div>

  <script src="/static/script.js"></script>
</body>
</html>
